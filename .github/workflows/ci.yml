name: ci

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version tag (e.g. v3.4.6). Required to publish a release.'
        required: false
        type: string
  push:
    branches-ignore: [release]
    tags: ['*']
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
      attestations: write

    steps:
      - uses: actions/checkout@v6
      - uses: actions/upload-artifact@v7
        with:
          name: docs
          path: |
            README.md
            README.userscript.md
            LICENSE
      - name: Install
        uses: wyvox/action-setup-pnpm@v3
      - name: Download crx key
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        env:
          CRX_KEY: ${{ secrets.CRX_KEY }}
        run: |
          if [ -n "$CRX_KEY" ]; then
            echo "$CRX_KEY" > key.pem
          fi
      - name: Build monkey
        run: pnpm run build:monkey
      - name: Build chrome
        run: pnpm run build:chrome
      - name: Pack chrome
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        run: pnpm run pack:chrome
      - name: Build firefox
        run: pnpm run build:firefox
      - name: Pack firefox
        run: pnpm run pack:firefox
      - name: List releases
        run: ls -lh releases/
      - uses: actions/attest-build-provenance@v4
        if: startsWith(github.event.ref, 'refs/tags/') || (github.event_name == 'workflow_dispatch' && inputs.version != '')
        with:
          subject-path: releases/
      - uses: actions/upload-artifact@v7
        with:
          name: releases
          path: releases/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    if: startsWith(github.event.ref, 'refs/tags/') || (github.event_name == 'workflow_dispatch' && inputs.version != '')

    steps:
      - uses: actions/checkout@v6
        with:
          ref: release
      - name: Download artifact
        uses: actions/download-artifact@v8
        with:
          name: docs
      - name: Download artifact
        uses: actions/download-artifact@v8
        with:
          name: releases
      - name: Get release tag
        id: tag
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "value=${{ inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "value=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          fi
      - name: Generate checksum
        run: |
          sha256sum * > sha256sum.txt
          cat sha256sum.txt
      - name: Publish github release
        uses: ncipollo/release-action@v1
        with:
          allowUpdates: true
          artifacts: '*'
          replacesArtifacts: true
          generateReleaseNotes: true
          tag: ${{ steps.tag.outputs.value }}
          body: |
            [更新日志](https://github.com/EhTagTranslation/EhSyringe/blob/master/CHANGELOG.md)
          prerelease: ${{ contains(steps.tag.outputs.value, '-') }}
      - name: Commit release mirror
        run: |
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git config user.name 'github-actions[bot]'
          git add .
          git commit -am 'Release for [${{ steps.tag.outputs.value }}](https://github.com/${{ github.repository }}/tree/${{ steps.tag.outputs.value }})'
          git push
